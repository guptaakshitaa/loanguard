[tool.poetry]
name = "loanguard"
version = "1.0.0"
description = "LoanGuard AI — Production Credit Risk Assessment System"
authors = ["LoanGuard Team"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.10"

# Core ML
scikit-learn = "^1.4"
xgboost       = "^2.0"
lightgbm      = "^4.3"
optuna        = "^3.6"

# Data
numpy   = "^1.26"
pandas  = "^2.2"
pyarrow = "^15.0"

# Experiment tracking
mlflow = "^2.13"

# Settings
pydantic          = "^2.7"
pydantic-settings = "^2.3"

[tool.poetry.group.dev.dependencies]
pytest     = "^8.2"
pytest-cov = "^5.0"
black      = "^24.4"
ruff       = "^0.4"
mypy       = "^1.10"

[build-system]
requires      = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP"]

[tool.mypy]
strict = true
ignore_missing_imports = true
